<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AKUMA WIN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:sans-serif;background:#fff5ea}
.submit-btn{width:100%;padding:14px;background:#d62828;color:#fff;border:none;border-radius:12px}
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.success-overlay.show{display:flex}
.success-box{background:#fff;padding:30px;border-radius:20px;text-align:center}
.confetti{position:fixed;width:10px;height:18px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(720deg)}}
</style>
</head>

<body>

<div class="container mt-5">
  <h3>Баримт бүртгүүлэх</h3>

  <form id="receiptForm">
    <input type="text" id="name" class="form-control mb-2" placeholder="Нэр">
    <input type="tel" id="phone" class="form-control mb-2" placeholder="99112233">
    <input type="number" id="amount" class="form-control mb-2" placeholder="200000">
    <input type="file" id="receiptImage" class="form-control mb-2">

    <div id="result"></div>

    <button class="submit-btn" id="submitBtn">Илгээх</button>
  </form>
</div>

<!-- SUCCESS POPUP -->
<div id="successOverlay" class="success-overlay">
  <div class="success-box">
    <h3>Амжилттай 🎉</h3>
    <p>
      Илгээгдлээ.<br>
      ⏳ Дахин илгээх: <b id="cooldownText">15 мин</b>
    </p>
    <button onclick="closeSuccessEffect()">Хаах</button>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxp_H-ZD56dKnK33joufa5jhybPHHOwUvRdWkg8nPJKLQqaVZ0_rZ0-9c-gY-yyrdgg6A/exec";

const receiptForm = document.getElementById("receiptForm");
const fileInput = document.getElementById("receiptImage");
const fileText = document.getElementById("fileText");
const result = document.getElementById("result");
const submitBtn = document.getElementById("submitBtn");

let isSubmitting = false;
const formLoadedAt = Date.now();

document.getElementById("year").textContent = new Date().getFullYear();

// FILE NAME
fileInput.addEventListener("change", () => {
  fileText.textContent = fileInput.files.length > 0 ? fileInput.files[0].name : "Баримтын зураг сонгох";
});

// PHONE FORMAT
document.getElementById("phone").addEventListener("input", function () {
  this.value = this.value.replace(/\D/g, "").slice(0, 8);
});

// BASE64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ALERT
function showMessage(type, text) {
  result.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

// SUCCESS EFFECT
function showSuccessEffect() {
  document.getElementById("successOverlay").classList.add("show");
}
function closeSuccessEffect() {
  document.getElementById("successOverlay").classList.remove("show");
}

// ⏱ COOLDOWN BUTTON
function checkCooldown() {
  const last = localStorage.getItem("lastSubmitTime");
  if (!last) return;

  const wait = 15 * 60 * 1000;

  const interval = setInterval(() => {
    const diff = Date.now() - Number(last);

    if (diff >= wait) {
      submitBtn.disabled = false;
      submitBtn.textContent = "Илгээх";
      clearInterval(interval);
    } else {
      submitBtn.disabled = true;

      const remain = wait - diff;
      const m = Math.floor(remain / 60000);
      const s = Math.floor((remain % 60000) / 1000);

      submitBtn.textContent = `Хүлээнэ үү (${m}:${s.toString().padStart(2,"0")})`;
    }
  }, 1000);
}

// ⏱ POPUP TIMER
function startPopupCountdown() {
  const el = document.getElementById("cooldownText");
  const last = localStorage.getItem("lastSubmitTime");
  if (!last || !el) return;

  const wait = 15 * 60 * 1000;

  const interval = setInterval(() => {
    const diff = Date.now() - Number(last);

    if (diff >= wait) {
      el.textContent = "Одоо дахин илгээж болно";
      clearInterval(interval);
    } else {
      const remain = wait - diff;
      const m = Math.floor(remain / 60000);
      const s = Math.floor((remain % 60000) / 1000);

      el.textContent = `${m} мин ${s} сек`;
    }
  }, 1000);
}

// LOAD
window.addEventListener("load", () => {
  checkCooldown();
});

// SUBMIT
receiptForm.addEventListener("submit", async function(e){
  e.preventDefault();
  if (isSubmitting) return;

  // COOLDOWN CHECK
  const last = localStorage.getItem("lastSubmitTime");
  if (last) {
    const wait = 15 * 60 * 1000;
    const diff = Date.now() - Number(last);

    if (diff < wait) {
      const remain = wait - diff;
      const m = Math.floor(remain / 60000);
      const s = Math.floor((remain % 60000) / 1000);

      return showMessage("danger", `Та ${m} мин ${s} сек хүлээнэ үү`);
    }
  }

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const imageFile = fileInput.files[0];

  if (!name) return showMessage("danger", "Нэрээ оруулна уу");
  if (!/^\d{8}$/.test(phone)) return showMessage("danger", "Утас буруу");
  if (!amount || Number(amount) < 200000) return showMessage("danger", "200,000₮-өөс дээш");
  if (!imageFile) return showMessage("danger", "Зураг оруулна уу");

  isSubmitting = true;
  submitBtn.disabled = true;
  submitBtn.textContent = "Илгээж байна...";
  showMessage("info", "Түр хүлээнэ үү...");

  try {
    const imageBase64 = await fileToBase64(imageFile);

    const payload = {
      name,
      phone,
      amount: Number(amount),
      imageBase64,
      imageName: imageFile.name,
      mimeType: imageFile.type
    };

    const res = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      console.log("RAW RESPONSE:", text);
      throw new Error("Backend JSON биш байна");
    }

    if (data.status === "success") {
      localStorage.setItem("lastSubmitTime", Date.now());

      showMessage("success", "Амжилттай илгээгдлээ");
      receiptForm.reset();
      fileText.textContent = "Баримтын зураг сонгох";

      showSuccessEffect();
      startPopupCountdown();
      checkCooldown();
    } else {
      showMessage("danger", data.message || "Алдаа гарлаа");
    }

  } catch (err) {
    console.error(err);
    showMessage("danger", "Сервер алдаа эсвэл backend буруу");
  } finally {
    isSubmitting = false;
  }
});
</script>

</body>
</html>
