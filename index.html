<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AKUMA WIN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:sans-serif;background:#fff5ea}
.submit-btn{width:100%;padding:14px;background:#d62828;color:#fff;border:none;border-radius:12px}
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.success-overlay.show{display:flex}
.success-box{background:#fff;padding:30px;border-radius:20px;text-align:center}
.confetti{position:fixed;width:10px;height:18px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(720deg)}}
</style>
</head>

<body>

<div class="container mt-5">
  <h3>Баримт бүртгүүлэх</h3>

  <form id="receiptForm">
    <input type="text" id="name" class="form-control mb-2" placeholder="Нэр">
    <input type="tel" id="phone" class="form-control mb-2" placeholder="99112233">
    <input type="number" id="amount" class="form-control mb-2" placeholder="200000">
    <input type="file" id="receiptImage" class="form-control mb-2">

    <div id="result"></div>

    <button class="submit-btn" id="submitBtn">Илгээх</button>
  </form>
</div>

<!-- SUCCESS POPUP -->
<div id="successOverlay" class="success-overlay">
  <div class="success-box">
    <h3>Амжилттай 🎉</h3>
    <p>
      Илгээгдлээ.<br>
      ⏳ Дахин илгээх: <b id="cooldownText">15 мин</b>
    </p>
    <button onclick="closeSuccessEffect()">Хаах</button>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxp_H-ZD56dKnK33joufa5jhybPHHOwUvRdWkg8nPJKLQqaVZ0_rZ0-9c-gY-yyrdgg6A/exec";

const form = document.getElementById("receiptForm");
const btn = document.getElementById("submitBtn");
const result = document.getElementById("result");

let isSubmitting=false;

// base64
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// message
function showMessage(type,text){
  result.innerHTML=`<div class="alert alert-${type}">${text}</div>`;
}

// confetti
function launchConfetti(){
  for(let i=0;i<40;i++){
    const d=document.createElement("div");
    d.className="confetti";
    d.style.left=Math.random()*100+"vw";
    d.style.background=["red","yellow","white"][Math.floor(Math.random()*3)];
    d.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}

// popup
function showSuccessEffect(){
  document.getElementById("successOverlay").classList.add("show");
  launchConfetti();
}
function closeSuccessEffect(){
  document.getElementById("successOverlay").classList.remove("show");
}

// BUTTON countdown
function checkCooldown(){
  const t=localStorage.getItem("lastSubmitTime");
  if(!t) return;

  const wait=15*60*1000;

  const int=setInterval(()=>{
    const diff=Date.now()-t;

    if(diff>=wait){
      btn.disabled=false;
      btn.textContent="Илгээх";
      clearInterval(int);
    }else{
      btn.disabled=true;
      const m=Math.floor((wait-diff)/60000);
      const s=Math.floor(((wait-diff)%60000)/1000);
      btn.textContent=`Хүлээнэ үү ${m}:${s.toString().padStart(2,"0")}`;
    }
  },1000);
}

// POPUP countdown
function startPopupCountdown(){
  const el=document.getElementById("cooldownText");
  const t=localStorage.getItem("lastSubmitTime");
  if(!t||!el) return;

  const wait=15*60*1000;

  const int=setInterval(()=>{
    const diff=Date.now()-t;

    if(diff>=wait){
      el.textContent="Боломжтой";
      clearInterval(int);
    }else{
      const m=Math.floor((wait-diff)/60000);
      const s=Math.floor(((wait-diff)%60000)/1000);
      el.textContent=`${m} мин ${s} сек`;
    }
  },1000);
}

// load
window.onload=()=>{
  checkCooldown();

  const t=localStorage.getItem("lastSubmitTime");
  if(t && Date.now()-t < 15*60*1000){
    showSuccessEffect();
    startPopupCountdown();
  }
};

// submit
form.addEventListener("submit",async e=>{
  e.preventDefault();
  if(isSubmitting) return;

  const last=localStorage.getItem("lastSubmitTime");
  if(last){
    const diff=Date.now()-last;
    if(diff<15*60*1000){
      const m=Math.floor((15*60*1000-diff)/60000);
      return showMessage("danger",`${m} минут хүлээнэ үү`);
    }
  }

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value.replace(/\D/g,"").slice(-8);
  const amount=document.getElementById("amount").value;
  const file=document.getElementById("receiptImage").files[0];

  if(!name) return showMessage("danger","Нэр");
  if(!/^\d{8}$/.test(phone)) return showMessage("danger","Утас");
  if(amount<200000) return showMessage("danger","200k+");
  if(!file) return showMessage("danger","Зураг");

  isSubmitting=true;
  btn.disabled=true;
  btn.textContent="...";

  try{
    const base64=await fileToBase64(file);

    const res=await fetch(scriptURL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({name,phone,amount,imageBase64:base64})
    });

    const data=JSON.parse(await res.text());

    if(data.status==="success"){
      localStorage.setItem("lastSubmitTime",Date.now());

      showMessage("success","OK");
      form.reset();

      showSuccessEffect();
      startPopupCountdown();
      checkCooldown();
    }else{
      showMessage("danger","Алдаа");
    }

  }catch{
    showMessage("danger","Server алдаа");
  }

  isSubmitting=false;
});
</script>

</body>
</html>
